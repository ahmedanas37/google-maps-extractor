<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>popup</title>
    <link href="css/style.css" rel="stylesheet" />
    <script src="lib/fetch.umd.js"></script>
    <script src="lib/jquery-3.1.1.min.js"></script>
</head>

<body>
    <div id="maincontent">
        <div id="content" class="popup-shell">
            <div class="popup-orbit popup-orbit-left"></div>
            <div class="popup-orbit popup-orbit-right"></div>

            <header class="popup-hero">
                <div class="popup-badge">Chrome Extension</div>
                <h1>Maps Scraper</h1>
                <p class="popup-copy">Collect Google Maps leads locally, then export them without quotas or paywalls.</p>
            </header>

            <section class="popup-status">
                <span class="popup-status-label">Status</span>
                <span id="accountinfo"></span>
            </section>

            <section class="popup-panel">
                <label class="popup-label" for="profileid">Quick search</label>
                <input type="text" id="profileid" value="coffee shop near new york" />
                <button id="addprofilebtn">Search Google Maps</button>
                <p class="popup-helper">This opens a fresh Google Maps search so you can start scraping immediately.</p>
            </section>

        </div>
    </div>
</body>
<script src="js/popup.js"></script>

</html>
